<!doctype html>
<html>
    <head>
        <title>Your Top Items</title>
        <meta name="description" content="Shows you the average values of your top songs' audio features">
        <link href="/static/style.css" rel="stylesheet" type="text/css" media="all">
    </head>
    <body>
        <h1>Your Music Taste</h1>

        <div class="avg_data_container">
            <h2>Average values of your top songs</h2>
            <hr>
            {% for field in avg_info %}
                <div>
                    <h3>{{field|capitalize}}: {{avg_info[field][0]}} {{avg_info[field][1]}}</h4>
                    <p>{{responses[field]}}</p>
                    <hr>
                </div>
            {% endfor %}
        </div>
    </body>
</html>
